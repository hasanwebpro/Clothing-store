[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "pip install -r requirements.txt && python manage.py migrate --settings=config.settings.production --noinput && python -c \"import django, os; os.environ.setdefault('DJANGO_SETTINGS_MODULE','config.settings.production'); django.setup(); from apps.products.models import Product; exit(0) if Product.objects.exists() else exit(1)\" && echo 'DB already seeded, skipping' || python manage.py seed_db --no-images --settings=config.settings.production && python manage.py collectstatic --settings=config.settings.production --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/api/v1/products/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
