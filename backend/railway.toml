[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --settings=config.settings.production --noinput && python manage.py collectstatic --settings=config.settings.production --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/api/v1/products/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
